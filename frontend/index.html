<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — Personal Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0e0e0e;
    --ink2: #1a1a1a;
    --ink3: #2a2a2a;
    --line: #2e2e2e;
    --muted: #666;
    --dim: #444;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --accent: #c8903a;
    --accent-dim: #9b6e28;
    --red: #c0392b;
    --green: #27796e;
    --green-light: #2ecc8a;
    --blue: #2980b9;
    --purple: #8e5fd4;
    --orange: #e67e22;
    --teal: #16a085;
  }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* Subtle grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,144,58,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,144,58,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line);
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 38px;
    color: var(--paper);
    letter-spacing: -1px;
    line-height: 1;
  }
  .logo span {
    color: var(--accent);
    font-style: italic;
  }

  .header-meta {
    text-align: right;
    color: var(--muted);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
  }
  .header-meta .today {
    color: var(--accent);
    font-size: 13px;
    margin-bottom: 2px;
  }

  /* Summary Cards */
  .summary {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 36px;
  }

  .card {
    background: var(--ink2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--dim); }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .card.income::before { background: var(--green-light); }
  .card.expense::before { background: var(--red); }
  .card.balance::before { background: var(--accent); }

  .card-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
  }
  .card-value {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    letter-spacing: -1px;
    line-height: 1;
  }
  .card.income .card-value { color: var(--green-light); }
  .card.expense .card-value { color: #e07070; }
  .card.balance .card-value { color: var(--paper); }
  .card-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    font-family: 'DM Mono', monospace;
  }

  /* Add Transaction */
  .add-section {
    background: var(--ink2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 24px;
    margin-bottom: 32px;
  }
  .add-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr auto;
    gap: 12px;
    align-items: end;
  }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  input, select {
    background: var(--ink3);
    border: 1px solid var(--line);
    border-radius: 3px;
    color: var(--paper);
    padding: 10px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    width: 100%;
    transition: border-color 0.2s, background 0.2s;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
  }
  input:focus, select:focus {
    border-color: var(--accent);
    background: #222;
  }
  input::placeholder { color: var(--dim); }

  select option { background: #1a1a1a; }

  .btn {
    background: var(--accent);
    border: none;
    border-radius: 3px;
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 22px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .btn:hover { background: #d9a04a; }
  .btn:active { transform: scale(0.98); }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filter-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .filter-pill {
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 20px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-pill:hover { border-color: var(--dim); color: var(--paper); }
  .filter-pill.active {
    background: var(--ink3);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Transactions Table */
  .table-wrap {
    background: var(--ink2);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
  }

  .table-header {
    display: grid;
    grid-template-columns: 1fr 100px 130px 110px 44px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--line);
    background: var(--ink3);
  }
  .th {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .th.right { text-align: right; }

  .tx-list { min-height: 160px; }

  .tx-row {
    display: grid;
    grid-template-columns: 1fr 100px 130px 110px 44px;
    padding: 14px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    align-items: center;
    transition: background 0.15s;
    animation: slideIn 0.25s ease;
  }
  .tx-row:last-child { border-bottom: none; }
  .tx-row:hover { background: rgba(255,255,255,0.02); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tx-desc {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .tx-name {
    color: var(--paper);
    font-size: 14px;
    font-weight: 400;
  }
  .tx-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .tx-cat {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
  }

  .cat-badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 3px;
    font-size: 10px;
    letter-spacing: 0.5px;
    font-family: 'DM Mono', monospace;
  }

  .tx-type {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .tx-type.income { color: var(--green-light); }
  .tx-type.expense { color: #e07070; }

  .tx-amount {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    text-align: right;
    letter-spacing: -0.5px;
  }
  .tx-amount.income { color: var(--green-light); }
  .tx-amount.expense { color: #e07070; }

  .tx-del {
    background: none;
    border: none;
    color: var(--dim);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
    border-radius: 3px;
    transition: color 0.15s, background 0.15s;
    text-align: right;
  }
  .tx-del:hover { color: var(--red); background: rgba(192,57,43,0.1); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--dim);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
  }
  .empty-state .big {
    font-family: 'DM Serif Display', serif;
    font-size: 42px;
    color: var(--line);
    display: block;
    margin-bottom: 10px;
  }

  /* Chart section */
  .chart-section {
    margin-top: 28px;
    background: var(--ink2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 24px;
  }
  .chart-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .chart-bars {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .chart-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chart-cat-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 90px;
    flex-shrink: 0;
    text-align: right;
  }
  .chart-bar-wrap {
    flex: 1;
    background: var(--ink3);
    border-radius: 2px;
    height: 20px;
    overflow: hidden;
  }
  .chart-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(.16,.84,.44,1);
    display: flex;
    align-items: center;
    padding-left: 8px;
    min-width: 0;
  }
  .chart-bar-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: rgba(0,0,0,0.7);
    white-space: nowrap;
    overflow: hidden;
  }
  .chart-amount {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 80px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Month picker */
  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .month-btn {
    background: var(--ink3);
    border: 1px solid var(--line);
    color: var(--muted);
    border-radius: 3px;
    padding: 5px 12px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    transition: all 0.15s;
  }
  .month-btn:hover { border-color: var(--accent); color: var(--accent); }
  .month-display {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--paper);
    letter-spacing: -0.5px;
  }

  @media (max-width: 640px) {
    .summary { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr 1fr; }
    .table-header, .tx-row {
      grid-template-columns: 1fr 110px 44px;
    }
    .th:nth-child(2), .th:nth-child(3),
    .tx-cat, .tx-type { display: none; }
    .logo { font-size: 28px; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="logo">Le<span>dger</span></div>
    <div class="header-meta">
      <div class="today" id="todayDate"></div>
      <div>Personal Finance</div>
    </div>
  </header>

  <!-- Month Navigation -->
  <div class="month-nav">
    <button class="month-btn" id="prevMonth">&#8592;</button>
    <div class="month-display" id="monthDisplay"></div>
    <button class="month-btn" id="nextMonth">&#8594;</button>
  </div>

  <!-- Summary Cards -->
  <div class="summary">
    <div class="card income">
      <div class="card-label">Total Income</div>
      <div class="card-value" id="totalIncome">₹0</div>
      <div class="card-sub" id="incomeCount">0 transactions</div>
    </div>
    <div class="card expense">
      <div class="card-label">Total Expenses</div>
      <div class="card-value" id="totalExpense">₹0</div>
      <div class="card-sub" id="expenseCount">0 transactions</div>
    </div>
    <div class="card balance">
      <div class="card-label">Net Balance</div>
      <div class="card-value" id="netBalance">₹0</div>
      <div class="card-sub" id="balanceNote">—</div>
    </div>
  </div>

  <!-- Add Transaction -->
  <div class="add-section">
    <div class="add-title">// New Transaction</div>
    <div class="form-row">
      <div class="field">
        <label>Description</label>
        <input type="text" id="desc" placeholder="e.g. Grocery run, Salary..." />
      </div>
      <div class="field">
        <label>Amount (₹)</label>
        <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" />
      </div>
      <div class="field">
        <label>Category</label>
        <select id="category">
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Shopping">Shopping</option>
          <option value="Health">Health</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Utilities">Utilities</option>
          <option value="Salary" selected>Salary</option>
          <option value="Freelance">Freelance</option>
          <option value="Investment">Investment</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="field">
        <label>Type</label>
        <select id="type">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
      </div>
      <button class="btn" id="addBtn">Add</button>
    </div>
  </div>

  <!-- Filter -->
  <div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <button class="filter-pill active" data-filter="all">All</button>
    <button class="filter-pill" data-filter="income">Income</button>
    <button class="filter-pill" data-filter="expense">Expense</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-header">
      <div class="th">Description</div>
      <div class="th">Category</div>
      <div class="th">Type</div>
      <div class="th right">Amount</div>
      <div class="th"></div>
    </div>
    <div class="tx-list" id="txList"></div>
  </div>

  <!-- Chart -->
  <div class="chart-section">
    <div class="chart-title">// Spending by Category</div>
    <div class="chart-bars" id="chartBars"></div>
  </div>

</div>

<script>
const API = 'http://127.0.0.1:5000/api';
const USER_ID = 1;

let transactions = [];
let filter = 'all';
let viewDate = new Date();
viewDate.setDate(1);

// ─── API FUNCTIONS ───────────────────────────────────

async function fetchExpenses() {
  const year  = viewDate.getFullYear();
  const month = viewDate.getMonth() + 1;
  try {
    const res  = await fetch(`${API}/expenses?user_id=${USER_ID}&year=${year}&month=${month}`);
    transactions = await res.json();
    render();
  } catch(e) {
    console.error('Failed to fetch expenses:', e);
  }
}

async function addExpenseAPI(desc, amount, categoryName, type) {
  try {
    // First get categories to find category_id
    const catRes = await fetch(`${API}/categories?user_id=${USER_ID}`);
    const cats   = await catRes.json();
    const cat    = cats.find(c => c.category_name === categoryName);
    if (!cat) return alert('Category not found');

    const today = new Date().toISOString().split('T')[0];

    const res = await fetch(`${API}/expenses`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id:     USER_ID,
        category_id: cat.category_id,
        description: desc,
        amount:      amount,
        txn_type:    type.toUpperCase(),
        txn_date:    today
      })
    });

    const data = await res.json();
    if (data.error) return alert('Error: ' + data.error);
    await fetchExpenses();

  } catch(e) {
    console.error('Failed to add expense:', e);
  }
}

async function deleteExpenseAPI(expenseId) {
  try {
    await fetch(`${API}/expenses/${expenseId}?user_id=${USER_ID}`, {
      method: 'DELETE'
    });
    await fetchExpenses();
  } catch(e) {
    console.error('Failed to delete expense:', e);
  }
}

// ─── FORMATTING ──────────────────────────────────────

function fmt(n) {
  return '₹' + Math.abs(n).toLocaleString('en-IN', {
    minimumFractionDigits: 0, maximumFractionDigits: 2
  });
}

function monthKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

// ─── RENDER ──────────────────────────────────────────

function updateHeader() {
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  document.getElementById('monthDisplay').textContent =
    months[viewDate.getMonth()] + ' ' + viewDate.getFullYear();
  const now  = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('todayDate').textContent =
    days[now.getDay()] + ', ' + now.toLocaleDateString('en-IN',{
      day:'numeric', month:'short', year:'numeric'
    });
}

function updateSummary() {
  const income  = transactions.filter(t=>t.txn_type==='INCOME') .reduce((a,t)=>a+t.amount,0);
  const expense = transactions.filter(t=>t.txn_type==='EXPENSE').reduce((a,t)=>a+t.amount,0);
  const net     = income - expense;

  document.getElementById('totalIncome') .textContent = fmt(income);
  document.getElementById('totalExpense').textContent = fmt(expense);
  document.getElementById('netBalance')  .textContent = (net < 0 ? '−' : '') + fmt(net);
  document.getElementById('netBalance')  .style.color =
    net < 0 ? '#e07070' : (net > 0 ? '#7fe0bb' : 'var(--paper)');
  document.getElementById('incomeCount') .textContent =
    transactions.filter(t=>t.txn_type==='INCOME').length  + ' transactions';
  document.getElementById('expenseCount').textContent =
    transactions.filter(t=>t.txn_type==='EXPENSE').length + ' transactions';
  document.getElementById('balanceNote') .textContent =
    net >= 0 ? 'Surplus this month' : 'Deficit this month';
}

function updateList() {
  const list = document.getElementById('txList');
  let txs = [...transactions];
  if (filter === 'income')  txs = txs.filter(t => t.txn_type === 'INCOME');
  if (filter === 'expense') txs = txs.filter(t => t.txn_type === 'EXPENSE');

  if (!txs.length) {
    list.innerHTML = `<div class="empty-state"><span class="big">∅</span>No transactions found</div>`;
    return;
  }

  list.innerHTML = txs.map(t => {
    const col      = t.color_code || '#888';
    const badgeBg  = col + '22';
    const d        = new Date(t.txn_date);
    const dateStr  = d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
    const typeClass = t.txn_type === 'INCOME' ? 'income' : 'expense';
    return `
    <div class="tx-row">
      <div class="tx-desc">
        <span class="tx-name">${t.description}</span>
        <span class="tx-date">${dateStr}</span>
      </div>
      <div class="tx-cat">
        <span class="cat-badge" style="background:${badgeBg};color:${col}">
          ${t.category_name}
        </span>
      </div>
      <div class="tx-type ${typeClass}">${t.txn_type.toLowerCase()}</div>
      <div class="tx-amount ${typeClass}">
        ${t.txn_type==='EXPENSE'?'−':'+'} ${fmt(t.amount)}
      </div>
      <button class="tx-del" data-id="${t.expense_id}" title="Delete">×</button>
    </div>`;
  }).join('');
}

function updateChart() {
  const txs  = transactions.filter(t => t.txn_type === 'EXPENSE');
  const cats = {};
  txs.forEach(t => { cats[t.category_name] = (cats[t.category_name]||0) + t.amount; });
  const sorted = Object.entries(cats).sort((a,b) => b[1]-a[1]);
  const max    = sorted[0]?.[1] || 1;
  const wrap   = document.getElementById('chartBars');

  if (!sorted.length) {
    wrap.innerHTML = `<div style="color:var(--dim);font-family:'DM Mono',monospace;
      font-size:12px;padding:20px 0">No expense data for this month</div>`;
    return;
  }

  wrap.innerHTML = sorted.map(([cat, amt]) => {
    const pct = (amt/max*100).toFixed(1);
    const col = '#888';
    return `
    <div class="chart-row">
      <div class="chart-cat-label">${cat}</div>
      <div class="chart-bar-wrap">
        <div class="chart-bar" style="width:${pct}%;background:${col}30;border-left:3px solid ${col}">
          <span class="chart-bar-label" style="color:${col}">${pct}%</span>
        </div>
      </div>
      <div class="chart-amount">${fmt(amt)}</div>
    </div>`;
  }).join('');
}

function render() {
  updateHeader();
  updateSummary();
  updateList();
  updateChart();
}

// ─── EVENT LISTENERS ─────────────────────────────────

document.getElementById('addBtn').addEventListener('click', async () => {
  const desc     = document.getElementById('desc').value.trim();
  const amount   = parseFloat(document.getElementById('amount').value);
  const category = document.getElementById('category').value;
  const type     = document.getElementById('type').value;

  if (!desc || isNaN(amount) || amount <= 0) {
    document.getElementById('desc').style.borderColor   = '#c0392b';
    document.getElementById('amount').style.borderColor = '#c0392b';
    setTimeout(()=>{
      document.getElementById('desc').style.borderColor   = '';
      document.getElementById('amount').style.borderColor = '';
    }, 1000);
    return;
  }

  await addExpenseAPI(desc, amount, category, type);
  document.getElementById('desc').value   = '';
  document.getElementById('amount').value = '';
});

document.getElementById('amount').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('addBtn').click();
});

document.getElementById('txList').addEventListener('click', async e => {
  const btn = e.target.closest('.tx-del');
  if (!btn) return;
  await deleteExpenseAPI(parseInt(btn.dataset.id));
});

document.querySelectorAll('.filter-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    filter = pill.dataset.filter;
    updateList();
  });
});

document.getElementById('prevMonth').addEventListener('click', () => {
  viewDate.setMonth(viewDate.getMonth()-1);
  fetchExpenses();
});

document.getElementById('nextMonth').addEventListener('click', () => {
  viewDate.setMonth(viewDate.getMonth()+1);
  fetchExpenses();
});

// ─── INIT ────────────────────────────────────────────
fetchExpenses();
</script>
</body>
</html>
